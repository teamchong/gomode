name = "gomode"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# R2: persistent filesystem storage
[[r2_buckets]]
binding = "FS_BUCKET"
bucket_name = "gomode-fs"

# KV: key-value store
[[kv_namespaces]]
binding = "KV"
id = "gomode-kv"

[durable_objects]
bindings = [
  { name = "GO_DO", class_name = "GoDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GoDO"]
